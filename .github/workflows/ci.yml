name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '22'

jobs:
  lint-and-typecheck:
    name: Lint, format check, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test (unit, integration, architecture, golden-dataset) + coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unified_sync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unified_sync
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/unified_sync
      ADMIN_API_KEY: ci-test-key
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:migrate:deploy
      - run: npx tsx prisma/seed.ts
      - run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Production build
    runs-on: ubuntu-latest
    env:
      # Build-time only: tsc doesn't connect to a database, but prisma generate needs a
      # syntactically valid DATABASE_URL to read the schema's datasource block.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unified_sync
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/unified_sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build

  architecture:
    name: Architecture rules (dependency-cruiser CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run arch:check
